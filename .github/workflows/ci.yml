name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'  # This matches all pull requests
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node.js 24 for actions

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]  # Use Node.js 24
    steps:
      # Checkout code with the latest stable version of actions/checkout
      - name: Checkout code
        uses: actions/checkout@v6 # Stable version of actions/checkout
        with:
          ref: ${{ github.sha }}  # Ensure the latest commit hash is used

      # Setup Node.js 24 explicitly with setup-node

      # Clear npm cache in case of any corrupted cache
      - name: Clear npm cache
        run: npm cache clean --force

      # Install dependencies
      - name: Install dependencies
        run: npm ci --verbose  # Run npm install with verbose output for debugging

      # Build project
      - name: Build
        run: npm run build --verbose  # Run build with verbose output to debug issues

      - name: Set up Node.js
        uses: actions/setup-node@v5  # Stable version of actions/setup-node
        with:
          node-version: 24  # Ensure Node.js 24 is used
          cache: 'npm'
      # TypeScript type check
      - name: TypeScript type check
        run: npx tsc --noEmit  # Run type-check without emitting JavaScript files

      # Lint code
      - name: Lint
        run: npm run lint

      # Fix lint issues
      - name: Lint fix
        run: npm run lint:fix

      # Format code
      - name: Format
        run: npm run format

      # Check formatting
      - name: Format check
        run: npm run format:check

      # Run tests
      - name: Run tests
        run: npm test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout code for deployment
      - name: Checkout code
        uses: actions/checkout@v4  # Use the latest version of actions/checkout

      # Setup Node.js 24 so npm ci --production runs on Node 24
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Install production dependencies
      - name: Install production dependencies
        run: npm ci --production  # Install only production dependencies

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: ${{ secrets.DOCKER_USERNAME }}/docker-cicd:latest
          push: true