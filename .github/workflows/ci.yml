name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'  # This matches all pull requests

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]  # Use Node.js 24
    steps:
      # Force Node.js 24
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v3  # Use the updated checkout action

      - name: Set up Node.js
        uses: actions/setup-node@v3  # Node.js setup
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json  # Explicit cache path

      - name: Install dependencies
        run: npm ci --verbose  # Run npm install with verbose output for debugging

      - name: Build
        run: npm run build

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Lint fix
        run: npm run lint:fix

      - name: Format
        run: npm run format

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Use the updated checkout action

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install production dependencies
        run: npm ci --production  # Install only production dependencies

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: ${{ secrets.DOCKER_USERNAME }}/docker-cicd:latest
          push: true