name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'  # This matches all pull requests

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]  # Use Node.js 24
    steps:
      # Ensure Node.js 24 is enforced for both actions
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3  # Use the updated checkout action
        with:
          ref: ${{ github.sha }}  # Ensure the latest commit hash is used

      # Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3  # Node.js setup
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json  # Explicit cache path

      # Install dependencies
      - name: Install dependencies
        run: npm ci --verbose  # Run npm install with verbose output for debugging

      # Build project
      - name: Build
        run: npm run build --verbose  # Run build with verbose output to debug issues

      # TypeScript type check
      - name: TypeScript type check
        run: npm run type-check

      # Lint code
      - name: Lint
        run: npm run lint

      # Fix lint issues
      - name: Lint fix
        run: npm run lint:fix

      # Format code
      - name: Format
        run: npm run format

      # Check formatting
      - name: Format check
        run: npm run format:check

      # Run tests
      - name: Run tests
        run: npm test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3  # Use the updated checkout action

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Install production dependencies
      - name: Install production dependencies
        run: npm ci --production  # Install only production dependencies

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: ${{ secrets.DOCKER_USERNAME }}/docker-cicd:latest
          push: true
