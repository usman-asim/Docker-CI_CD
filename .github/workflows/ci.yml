name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'  # This matches all pull requests
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]  # Use Node.js 24
    steps:
      
      - name: Checkout code
        uses: actions/checkout@v5 
        with:
          ref: ${{ github.sha }}  # Ensure the latest commit hash is used

      #
      # Setup Node.js 24 explicitly with actions/setup-node
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24  # Ensure Node.js 24 is used
          cache: 'npm'

      # # Clear npm cache in case of any corrupted cache
      # - name: Clear npm cache
      #   run: npm cache clean --force

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build project
      - name: Build
        run: npm run build --verbose  # Run build with verbose output to debug issues

      # TypeScript type check
      - name: TypeScript type check
        run: npm run type-check

      # Lint code
      # - name: Lint
      #   run: npm run lint

      # # Fix lint issues
      # - name: Lint fix
      #   run: npm run lint:fix

      # # Format code
      # - name: Format
      #   run: npm run format

      # # Check formatting
      # - name: Format check
      #   run: npm run format:check

      
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout code for deployment
      - name: Checkout code
        uses: actions/checkout@v5
      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Install production dependencies
      - name: Install production dependencies
        run: npm install --production  # Install only production dependencies

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: ${{ secrets.DOCKER_USERNAME }}/docker-cicd:latest